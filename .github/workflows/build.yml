name: Build

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "rebar.config"
      - "rebar.lock"
      - "c_src/**"
      - "include/**"
      - "src/**"
      - "test/**"
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "rebar.config"
      - "rebar.lock"
      - "c_src/**"
      - "include/**"
      - "src/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libegl-dev libgles-dev

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile

      - name: Run the runtime tests
        run: EGL_PLATFORM=surfaceless rebar3 eunit

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Set up ANGLE
        id: angle
        uses: erlangsters/setup-angle@v1

      - name: Compile the binding
        run: |
          export ANGLE_INCLUDE_DIR="${{ steps.angle.outputs.angle-location }}/include"
          export ANGLE_LIB_DIR="${{ steps.angle.outputs.angle-location }}/lib"
          rebar3 compile

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Set up ANGLE
        id: angle
        uses: erlangsters/setup-angle@v1

      - name: Compile the binding
        run: |
          $angleLocation = "${{ steps.angle.outputs.angle-location }}"
          $env:ANGLE_INCLUDE_DIR = "$angleLocation\include"
          $env:ANGLE_LIB_DIR = "$angleLocation\lib"
          rebar3 compile
        shell: pwsh
