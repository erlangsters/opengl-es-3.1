name: GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/gh-pages.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "docs/**"
      - "rebar.config"
      - "rebar.lock"
      - "c_src/**"
      - "include/**"
      - "src/**"
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/gh-pages.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "docs/**"
      - "rebar.config"
      - "rebar.lock"
      - "c_src/**"
      - "include/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "gh-pages-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libegl-dev libgles-dev

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Build the documentation
        run: rebar3 as docs ex_doc

      - name: Upload the GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_build/docs/site"

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy the documentation
        id: deployment
        uses: actions/deploy-pages@v4
